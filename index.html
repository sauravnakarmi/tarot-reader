<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Tarot Reader</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- GOOGLE FONTS -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet"
    >

</head>

<div id="cardModal" class="card-modal">

    <div class="modal-backdrop"></div>

    <div class="modal-content">

        <button id="closeModal">
            ✕
        </button>

        <div class="modal-card-container">

            <img
                id="modalImage"
                src=""
                alt=""
            >

        </div>

        <div class="modal-info">

            <h2 id="modalTitle"></h2>

            <p id="modalMeaning"></p>

        </div>

    </div>

</div>

<body>

    <main class="container">

        <h1 class="title">
            Tarot Reader
        </h1>

        <p class="subtitle">
            Draw your cards and reveal your reading
        </p>

        <button id="drawBtn">
            Draw Reading
        </button>
        <button id="aiReadingBtn">
            🔮 AI Reading
        </button>

        <section id="cardContainer"></section>
        
        <div id="aiReading">

    <div class="reading-placeholder">

    ╔══════════════════════════════╗
    <br>
    ✦ THE ORACLE AWAITS ✦
    <br>
    ╚══════════════════════════════╝

    <br><br>

    The deck rests in silence.

    <br><br>

    Draw five cards to reveal your fate.

    <br><br>

    ► DRAW READING
    <br>
    ► REVEAL THE CARDS
    <br>
    ► CONSULT THE ORACLE

</div>

</div>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
